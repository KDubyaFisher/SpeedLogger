<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SpeedLogger{% endblock %}</title>

    <!-- Bootstrap CDN is used for a clean, responsive interface. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="{% url 'core:home' %}">
            SpeedLogger
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
            aria-controls="mainNavbar"
            aria-expanded="false"
            aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            {% if user.is_authenticated %}
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-2">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:customer_list' %}">Customers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:site_list' %}">Sites</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:speedtest_list' %}">Speed Tests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:speedtest_search' %}">Search</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:speedtest_report' %}">Reports</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <span class="navbar-text">
                        {{ user.username }}
                    </span>

                    <form method="post" action="{% url 'logout' %}" class="mb-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            Logout
                        </button>
                    </form>
                </div>
            {% else %}
                <div class="ms-auto">
                    <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">
                        Login
                    </a>
                </div>
            {% endif %}
        </div>
    </div>
</nav>
<main class="container">
    {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
