{% extends "base.html" %}

{% block title %}Delete Site | SpeedLogger{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Delete Site</h1>

<div class="alert alert-warning">
    Are you sure you want to delete "{{ object }}"? This action cannot be undone.
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'core:site_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
