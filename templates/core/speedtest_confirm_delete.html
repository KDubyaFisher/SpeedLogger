{% extends "base.html" %}

{% block title %}Delete Speed Test | SpeedLogger{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Delete Speed Test</h1>

<div class="alert alert-warning">
    Are you sure you want to delete this speed test record?
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'core:speedtest_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
